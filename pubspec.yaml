name: frontend
description: "Bondly — Dating & Social App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.7

  # HTTP
  dio: ^5.4.3+1

  # Storage
  flutter_secure_storage: ^9.2.2

  # Fonts
  google_fonts: ^6.2.1

  # Images
  cached_network_image: ^3.3.1
  image_picker: ^1.1.2

  # UI
  shimmer: ^3.0.0
  appinio_swiper: ^2.1.1

  # Utilities
  cupertino_icons: ^1.0.8
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.3

flutter:
  uses-material-design: true
